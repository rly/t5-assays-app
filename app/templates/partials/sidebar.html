<div class="sidebar-section">
    <h4>Data Source</h4>
    <fieldset>
        <label>
            <input type="radio" name="data_source" value="veev_peitho_merge"
                   {{ 'checked' if prefs.data_source_type == 'veev_peitho_merge' }}
                   hx-post="/data/source" hx-target="#main-swap" hx-swap="none"
                   hx-vals='{"source": "veev_peitho_merge"}'>
            VEEV MacroD PEITHO Merge
        </label>
        <label>
            <input type="radio" name="data_source" value="veev_parg_merge"
                   {{ 'checked' if prefs.data_source_type == 'veev_parg_merge' }}
                   hx-post="/data/source" hx-target="#main-swap" hx-swap="none"
                   hx-vals='{"source": "veev_parg_merge"}'>
            VEEV MacroD PARG Merge
        </label>
        <label>
            <input type="radio" name="data_source" value="single_sheet"
                   {{ 'checked' if prefs.data_source_type == 'single_sheet' }}
                   hx-post="/data/source" hx-target="#main-swap" hx-swap="none"
                   hx-vals='{"source": "single_sheet"}'>
            Single Google Sheet
        </label>
    </fieldset>

    {% if prefs.data_source_type == 'single_sheet' %}
    <select id="sheet-select" name="sheet_id"
            hx-post="/data/source" hx-target="#main-swap" hx-swap="none"
            hx-include="[name='data_source']"
            hx-vals='{"source": "single_sheet"}'>
        {% for name, info in sheets.items() %}
        <option value="{{ info.id }}" {{ 'selected' if selected_sheet_id == info.id }}>{{ name }}</option>
        {% endfor %}
    </select>
    {% endif %}
    {% if total_rows %}<small class="filter-row-count">{{ total_rows }} rows</small>{% endif %}
</div>

{% if prefs.data_source_type == 'veev_peitho_merge' %}
<div class="sidebar-section">
    <h4>Data Filters</h4>
    <form hx-post="/data/filters" hx-target="#main-swap" hx-swap="none">
        <label for="chi2_max">Chi2_ndof_RU2 &lt;</label>
        <input type="number" id="chi2_max" name="chi2_max" value="{{ prefs.chi2_max if prefs.chi2_max < 1000000000 else '' }}" step="1" min="0" placeholder="no filter">
        <label for="rmse_max">RMSE_RU &lt;</label>
        <input type="number" id="rmse_max" name="rmse_max" value="{{ prefs.rmse_max if prefs.rmse_max < 1000000000 else '' }}" step="1" min="0" placeholder="no filter">
        <button type="submit" class="secondary" style="width:100%; margin-bottom:0.5rem;">Apply Filters</button>
        <div style="display:flex; gap:0.5rem;">
            <button type="button" class="outline secondary btn-sm" style="flex:1;"
                    hx-post="/data/filters" hx-target="#main-swap" hx-swap="none"
                    hx-vals='{"chi2_max": "1000000000", "rmse_max": "1000000000"}'
                    onclick="document.getElementById('chi2_max').value=''; document.getElementById('rmse_max').value='';">Clear</button>
            <button type="button" class="outline btn-sm" style="flex:1;"
                    hx-post="/data/filters" hx-target="#main-swap" hx-swap="none"
                    hx-vals='{"chi2_max": "10", "rmse_max": "10"}'
                    onclick="document.getElementById('chi2_max').value='10'; document.getElementById('rmse_max').value='10';">Defaults</button>
        </div>
    </form>
</div>
{% endif %}

<div class="sidebar-section">
    <h4>AI Model</h4>
    <label for="openrouter_key">OpenRouter API Key</label>
    <input type="password" id="openrouter_key" name="openrouter_key"
           placeholder="sk-or-..." value="{{ api_key or '' }}"
           hx-post="/prefs/apikey" hx-trigger="change" hx-swap="none">

    <label for="model_select">Model</label>
    <select id="model_select" name="model"
            hx-post="/prefs/model" hx-trigger="change" hx-swap="none">
        {% for name, model_id in models.items() %}
        <option value="{{ model_id }}" {{ 'selected' if prefs.selected_model == model_id }}>{{ name }}</option>
        {% endfor %}
    </select>
    <div id="model-status"></div>
</div>

<!-- Hidden swap target for HTMX responses that trigger JS reloads -->
<div id="main-swap" style="display:none"></div>
